# GitHub Actions Workflow for preparing a reviewed release PR.
# It bumps gradle.properties, archives English/Chinese changelog entries,
# and opens or updates a release PR without creating a tag or publishing.

name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Target SemVer version, for example 0.2.0
        required: true
        type: string

jobs:
  prepare-release:
    name: Prepare Release PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Fetch Sources
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Prepare Release Branch
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          BRANCH="release/v$VERSION"
          DATE="$(date -u +%Y-%m-%d)"
          export DATE

          ruby <<'RUBY'
          version = ENV.fetch("VERSION")

          unless version.match?(/\A\d+\.\d+\.\d+\z/)
            abort("Invalid SemVer version: #{version}")
          end

          current = File.read("gradle.properties")[/^version\s*=\s*(.+)$/, 1]&.strip
          abort("Missing version in gradle.properties") unless current
          unless current.match?(/\A\d+\.\d+\.\d+\z/)
            abort("Invalid current SemVer version: #{current}")
          end

          current_parts = current.split(".").map(&:to_i)
          target_parts = version.split(".").map(&:to_i)
          unless target_parts <=> current_parts
            abort("Unable to compare #{current} and #{version}")
          end
          unless (target_parts <=> current_parts).positive?
            abort("Target version #{version} must be greater than current version #{current}")
          end
          RUBY

          git config user.name "actions-user"
          git config user.email "65916846+actions-user@users.noreply.github.com"
          git fetch origin main "$BRANCH" || true
          git switch -C "$BRANCH" origin/main
          mkdir -p build

          ruby <<'RUBY'
          version = ENV.fetch("VERSION")
          date = ENV.fetch("DATE")

          EMOJI_HEADINGS = ["### ✨", "### 🔄", "### 🐛", "### 🔧", "### 📚", "### 🧪", "### 📦", "### 🧱"].freeze
          PUBLIC_RELEASE_NOTE_EXCLUDED_HEADINGS = ["### 🔧 CI/CD"].freeze

          def extract_unreleased(path)
            content = File.read(path)
            match = content.match(/^## \[Unreleased\]\s*$\n(?<body>.*?)(?=^## \[|\z)/m)
            abort("Missing Unreleased section in #{path}") unless match

            body = match[:body].strip
            abort("Empty Unreleased section in #{path}") if body.empty?
            unless EMOJI_HEADINGS.any? { |heading| body.include?(heading) }
              abort("#{path} Unreleased must include at least one emoji changelog heading")
            end

            body
          end

          def public_release_notes(markdown)
            skip_section = false
            markdown.each_line.each_with_object([]) do |line, lines|
              stripped = line.strip
              if stripped.start_with?("### ")
                skip_section = PUBLIC_RELEASE_NOTE_EXCLUDED_HEADINGS.include?(stripped)
                next if skip_section
              elsif stripped.start_with?("## ")
                skip_section = false
              end

              lines << line unless skip_section
            end.join.strip
          end

          gradle = File.read("gradle.properties")
          gradle.sub!(/^version\s*=.*$/, "version = #{version}")
          File.write("gradle.properties", gradle)

          def archive_unreleased(path, heading, notes)
            content = File.read(path)
            abort("#{path} already contains #{heading}") if content.include?(heading)

            replacement = "## [Unreleased]\n\n#{heading}\n\n#{notes}\n"
            changed = content.sub(/^## \[Unreleased\]\s*$/, replacement)
            abort("Missing Unreleased section in #{path}") if changed == content
            File.write(path, changed)
          end

          notes_en = extract_unreleased("CHANGELOG.md")
          notes_zh = extract_unreleased("CHANGELOG_zh.md")
          public_notes_en = public_release_notes(notes_en)
          abort("Empty public release notes after filtering internal changelog sections") if public_notes_en.empty?

          archive_unreleased("CHANGELOG.md", "## [#{version}] - #{date}", notes_en)
          archive_unreleased("CHANGELOG_zh.md", "## [#{version}]", notes_zh)

          body = <<~BODY
          ## Summary
          Prepare release `v#{version}`.

          ## Release Notes
          #{public_notes_en}
          BODY

          File.write("build/release-pr-body.md", body)
          RUBY

          {
            echo "chore: release v$VERSION"
            echo
            echo "Co-authored-by: actions-user <65916846+actions-user@users.noreply.github.com>"
          } > build/release-commit-message.txt

          git add gradle.properties CHANGELOG.md CHANGELOG_zh.md

          if git diff --cached --quiet; then
            echo "No release changes detected."
          else
            git commit \
              --author="ark-65 <25193106+ark-65@users.noreply.github.com>" \
              -F build/release-commit-message.txt
          fi

          git push --force-with-lease --set-upstream origin "$BRANCH"

          gh label create release \
            --description "Release preparation pull request" \
            --color 0366d6 \
            --force \
            || true

          PR_NUMBER="$(gh pr list --head "$BRANCH" --base main --state open --json number --jq '.[0].number // ""')"
          if [[ -n "$PR_NUMBER" ]]; then
            gh pr edit "$PR_NUMBER" \
              --title "chore: release v$VERSION" \
              --body-file build/release-pr-body.md \
              --add-label release
          else
            gh pr create \
              --title "chore: release v$VERSION" \
              --body-file build/release-pr-body.md \
              --label release \
              --base main \
              --head "$BRANCH"
          fi

          {
            echo "branch=$BRANCH"
            echo "version=$VERSION"
          } >> "$GITHUB_OUTPUT"
